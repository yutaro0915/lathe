# CI = 単一ゲート（ADR 0026/0028）。検査の内容は rubrics/run.mjs（単一入口）に委ねる:
#   scope（変更パス）が「どれを」・tier が「どこまで」を決める。CI に検査を手書きしない。
#
# tier=test（旧 merge.mjs backstop と同等）: tsc / unit / cmd 系のみ。
# heavy（e2e / storybook / integration / judge）を CI で回さない理由:
#   - e2e は ingest 済み実データ前提（2026-06-23 決定を維持）
#   - judge は LLM key を CI に置くまで skip（RUBRIC_SKIP_JUDGE=1）
#   → heavy は verifier 段（ローカル）の責務のまま。CI 昇格は #69 / TASK-16 系で再訪。
#
# Postgres service: unit に DB 接続テストが含まれるため（schema-only で 680/680 GREEN を
# 2026-07-05 に実測）。データの seed は不要（テストが自前で fixture を作る）。
name: ci

on:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lathe
          POSTGRES_PASSWORD: lathe
          POSTGRES_DB: lathe
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U lathe"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://lathe:lathe@localhost:55432/lathe
      RUBRIC_SKIP_JUDGE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: apply schema
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends postgresql-client
          psql "$DATABASE_URL" -f apps/web/db/schema.sql
      - name: gate (rubrics/run.mjs --changed, tier=test)
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1 || true
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          if [ -z "$CHANGED" ]; then echo "no changed paths"; exit 0; fi
          node rubrics/run.mjs --changed $CHANGED --tier test
