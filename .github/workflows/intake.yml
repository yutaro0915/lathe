# intake（登記）= 判断ゼロの決定的機械（ADR 0027 追記 2026-07-05）
#
# `task-request` label が付いた issue を、到着順に backlog task へ写して close する。
# 却下はしない — priority や採否の triage は PdM が backlog の盤面で行う。
# 判断する主体（LLM）を登記に置くと規則を発明する（2026-07-05、実在しないテンプレの
# 必須フィールドを理由に #80 を却下した事例）ため、登記は deterministic に保つ。
#
# 単一 writer（ADR 0027 §2）: concurrency group で登記を常に 1 本ずつ直列化し、
# ID 採番（ローカル max+1）の競合を構造的に防ぐ。job は task ファイルの着地まで
# 完了しない（merge まで group を保持）ので、次の登記は必ず新 ID を見る。
#
# 自己制限: この機械は backlog/ 配下しか書かない（diff を機械検査、-z = quotePath 安全）。
# 注: GITHUB_TOKEN の PR は他 workflow（ci.yml）を起動しない既知仕様のため、
# merge は「即時 → 失敗時のみ checks を待って再試行」の順で行う。backlog-only diff は
# rubric gate の発火対象外であり、上の自己制限がその前提を機械で保証する。
name: intake

on:
  issues:
    types: [labeled]

concurrency:
  group: intake
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  register:
    if: github.event.label.name == 'task-request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create backlog task from issue
        id: create
        env:
          TITLE: ${{ github.event.issue.title }}
          BODY: ${{ github.event.issue.body }}
          NUM: ${{ github.event.issue.number }}
          AUTHOR: ${{ github.event.issue.user.login }}
          LABELS: ${{ join(github.event.issue.labels.*.name, ' ') }}
        run: |
          set -euo pipefail
          PRIO=medium
          case " $LABELS " in
            *" p0-urgent "*|*" p1-high "*) PRIO=high ;;
            *" p3-low "*) PRIO=low ;;
          esac
          DESC="$(printf '%s\n\n---\nintake: issue #%s <- @%s' "${BODY:-（本文なし）}" "$NUM" "$AUTHOR")"
          OUT="$(npx -y backlog.md task create "$TITLE" -d "$DESC" --priority "$PRIO" --plain)"
          echo "$OUT"
          # 「Task TASK-N - …」の行頭アンカーで採番結果だけを取る。
          # 素の grep はタイトル内の TASK-nn 言及（例:「TASK-16 の後始末」）を誤抽出する
          # （2026-07-05 #84 で実証 — commit message と issue 通知の ID が誤記になった）
          TASK_ID="$(echo "$OUT" | sed -n 's/^Task \(TASK-[0-9][0-9.]*\) .*/\1/p' | head -1)"
          test -n "$TASK_ID"
          echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"

      - name: Land task file (backlog-only, PR + merge)
        env:
          GH_TOKEN: ${{ github.token }}
          NUM: ${{ github.event.issue.number }}
          TASK_ID: ${{ steps.create.outputs.task_id }}
        run: |
          set -euo pipefail
          git config user.name "lathe-intake"
          git config user.email "intake-bot@users.noreply.github.com"
          git add backlog/
          if git diff --cached --name-only -z | tr '\0' '\n' | grep -v -e '^backlog/' -e '^$' | grep -q .; then
            echo "::error::non-backlog paths staged — registrar refuses to write outside backlog/" >&2
            exit 1
          fi
          # 採番の衝突検査: origin/main に同 ID が既に居たら失敗させる（label 再付与で再走
          # すれば新しい base から採番し直す）。concurrency group の直列化だけでは
          # 近接到着の 2 run が同じ base から採番し得る（2026-07-05、task-21 重複で実証）
          git fetch -q origin main
          N="${TASK_ID#TASK-}"
          if git ls-tree --name-only origin/main backlog/tasks/ | grep -qE "^backlog/tasks/task-$N "; then
            echo "::error::duplicate task id $TASK_ID already on origin/main — re-trigger the label to retry" >&2
            exit 1
          fi
          BR="intake/issue-$NUM"
          git checkout -b "$BR"
          git commit -m "intake: $TASK_ID <- issue #$NUM"
          git push -u origin "$BR"
          gh pr create --title "intake: $TASK_ID ← issue #$NUM" \
            --body "登記機械による自動 PR（ADR 0027・判断なし）。issue #$NUM を $TASK_ID として backlog に写す。backlog/ 以外に触れないことは workflow が機械検査済み。"
          gh pr merge "$BR" --squash --delete-branch || {
            gh pr checks "$BR" --watch
            gh pr merge "$BR" --squash --delete-branch
          }

      - name: Close issue with task reference
        env:
          GH_TOKEN: ${{ github.token }}
          NUM: ${{ github.event.issue.number }}
          TASK_ID: ${{ steps.create.outputs.task_id }}
        run: |
          gh issue comment "$NUM" --body "登記完了: $TASK_ID として backlog に登録しました（intake action・判断なし。priority 等の triage は盤面で）。"
          gh issue close "$NUM" --reason completed
