# intake（登記）= 判断ゼロの決定的機械（ADR 0027 追記 2026-07-05）
#
# `task-request` label が付いた issue を、到着順に backlog task へ写して close する。
# 却下はしない — priority や採否の triage は PdM が backlog の盤面で行う。
# 判断する主体（LLM）を登記に置くと規則を発明する（2026-07-05、実在しないテンプレの
# 必須フィールドを理由に #80 を却下した事例）ため、登記は deterministic に保つ。
#
# 単一 writer（ADR 0027 §2）: concurrency group で登記を常に 1 本ずつ直列化し、
# ID 採番（ローカル max+1）の競合を構造的に防ぐ。job は task ファイルの着地まで
# 完了しない（merge まで group を保持）ので、次の登記は必ず新 ID を見る。
#
# 自己制限: この機械は backlog/ 配下しか書かない（diff を機械検査、-z = quotePath 安全）。
#
# catch-up sweep（schedule + workflow_dispatch）: GitHub の concurrency queue は
# 待機 1 本しか保持しないため、バースト到着（3 issue 同時等）で中間の run が
# cancelled になり登記漏れする（2026-07-05 #77 で実発生）。hourly schedule と
# workflow_dispatch トリガを追加し、open かつ task-request 付き issue を全件
# 処理する sweep を実装する（lathe ingest と同型の push 主 + pull 補の型）。
#
# merge の checks 存在判定: checks が存在する場合は GREEN 後にのみ merge する。
# 不在の場合（GITHUB_TOKEN 構成では ci.yml が起動しないため常にこの経路）は即 merge。
# checks 出現待ちの poll は入れない（GITHUB_TOKEN 不変条件）。
name: intake

on:
  issues:
    types: [labeled]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: intake
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Register issues
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
          LABEL: ${{ github.event.label.name }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          # 対象 issue 番号リスト算出
          # issues.labeled: task-request ラベルの場合のみ該当番号 1 件を処理
          # schedule / workflow_dispatch: open + task-request 付き issue を全件 sweep
          if [ "$EVENT" = "issues" ]; then
            if [ "${LABEL}" = "task-request" ]; then
              NUMS="$ISSUE_NUM"
            else
              echo "label '${LABEL}' is not task-request — no-op"
              exit 0
            fi
          else
            NUMS="$(gh issue list --label task-request --state open --json number \
              -q '.[].number' | tr '\n' ' ')"
            if [ -z "${NUMS// /}" ]; then
              echo "no open task-request issues — sweep complete"
              exit 0
            fi
            echo "sweep targets: $NUMS"
          fi

          # per-issue 失敗隔離: 1 件の失敗で残りを止めない（§3-4）
          FAILED=()
          for NUM in $NUMS; do
            bash scripts/intake-register.sh "$NUM" || FAILED+=("$NUM")
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::warning::failed to register issues: ${FAILED[*]}"
            exit 1
          fi
